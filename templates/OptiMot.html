<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grille avec informations et case modifiable</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Ressources/style_optimot.css">
</head>

<body>
    <div class="container">
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="background-text">OPTI'MOT</div>
        </div>

        <div class="carte-wrapper">
            <div class="carte" id="carte"></div>
        </div>

        <div class="info-box">
            <div class="nom-joueur">Nom du Joueur: <span id="nomJoueur">Au tour de : </span></div>
            <div class="case-modifiable" id="case-modifiable">
                <div class="case" id="case1" draggable="true"><span class="lettre" id="lettre1"></span></div>
                <div class="case" id="case2" draggable="true"><span class="lettre" id="lettre2"></span></div>
                <div class="case" id="case3" draggable="true"><span class="lettre" id="lettre3"></span></div>
            </div>
            <div class="piocher-button-wrapper">
                <button class="piocher-button" id="piocherButton">Piocher</button>
                <button class="valider-button" id="validerButton">Valider</button>
                <!-- Nouveau bouton "Valider" ajouté ici -->
            </div>
        </div>

        <div class="boutons-zoom">
            <button id="zoomIn">+</button>
            <button id="zoomOut">-</button>
        </div>

        <!-- Nouveau champ Nom Joueur et bouton Se connecter en haut à gauche -->
        <div class="nom-joueur-container">
            <div>Nom Joueur:</div>
            <input type="text" id="nomJoueurInput" placeholder="Entrez votre nom">
            <button class="connecter-button" id="connecterButton">Se connecter</button>
            <button class="entrer-button" id="entrerButton">Entrer</button> <!-- Nouveau bouton "Entrer" ajouté -->
        </div>
    </div>

    <script>
        const carte = document.querySelector('#carte');
        const zoomInButton = document.getElementById('zoomIn');
        const zoomOutButton = document.getElementById('zoomOut');
        const piocherButton = document.getElementById('piocherButton');
        const validerButton = document.getElementById('validerButton'); // Nouveau bouton "Valider"
        const caseModifiable = document.getElementById('case-modifiable');
        const nomJoueurElement = document.getElementById('nomJoueur');
        const nomJoueurInput = document.getElementById('nomJoueurInput');
        const connecterButton = document.getElementById('connecterButton');
        const entrerButton = document.getElementById('entrerButton'); // Nouveau bouton "Entrer"

        function genererLettreAleatoire() {
            const lettres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const indexAleatoire = Math.floor(Math.random() * lettres.length);
            return lettres[indexAleatoire];
        }

        function genererGrille() {
            for (let i = 0; i < 32 * 32; i++) {
                const cellule = document.createElement('div');
                cellule.classList.add('case');
                cellule.setAttribute('draggable', 'false');
                cellule.addEventListener('dragover', gererDragOver);
                cellule.addEventListener('drop', gererDrop);
                carte.appendChild(cellule);
            }
        }

        function genererLettresInitiales() {
            const elementsLettre = caseModifiable.querySelectorAll('.lettre');
            elementsLettre.forEach(elementLettre => {
                elementLettre.textContent = genererLettreAleatoire();
                elementLettre.setAttribute('draggable', 'true');
                elementLettre.addEventListener('dragstart', gererDragStart);
            });
        }

        function genererLettresCentre() {
            const ligneCentre = 15;
            const colonneCentre = 15;
            for (let i = 0; i < 5; i++) {
                const lettre = genererLettreAleatoire();
                const indexCellule = (ligneCentre + i) * 32 + colonneCentre;
                const cellule = carte.children[indexCellule];

                const elementLettre = document.createElement('span');
                elementLettre.classList.add('lettre');
                elementLettre.textContent = lettre;
                cellule.appendChild(elementLettre);
            }
        }

        function gererDragStart(event) {
            event.dataTransfer.setData('text', event.target.id);
        }

        function gererDragOver(event) {
            event.preventDefault();
        }

        function gererDrop(event) {
            event.preventDefault();
            const lettreId = event.dataTransfer.getData('text');
            const elementLettre = document.getElementById(lettreId);
            const celluleCible = event.target;

            if (celluleCible.classList.contains('case') && !celluleCible.hasChildNodes()) {
                const nouvelleLettreElement = document.createElement('span');
                nouvelleLettreElement.classList.add('lettre');
                nouvelleLettreElement.textContent = elementLettre.textContent;
                celluleCible.appendChild(nouvelleLettreElement);

                const lettreParent = elementLettre.parentElement;
                if (lettreParent) {
                    lettreParent.removeChild(elementLettre);
                }

                supprimerCaseVide();
            }
        }

        function supprimerCaseVide() {
            const casesSousNom = caseModifiable.querySelectorAll('.case');
            casesSousNom.forEach(caseElement => {
                if (!caseElement.hasChildNodes()) {
                    caseElement.remove();
                }
            });
        }

        function activerDragPourLettres() {
            const elementsLettre = caseModifiable.querySelectorAll('.lettre');
            elementsLettre.forEach(lettre => {
                lettre.setAttribute('draggable', 'true');
                lettre.addEventListener('dragstart', gererDragStart);
            });
        }

        piocherButton.addEventListener('click', () => {
            const nouvelleCase = document.createElement('div');
            nouvelleCase.classList.add('case');
            nouvelleCase.style.backgroundColor = '#f0f0f0';
            const nouvelleLettre = document.createElement('span');
            nouvelleLettre.classList.add('lettre');
            nouvelleLettre.textContent = genererLettreAleatoire();
            nouvelleLettre.setAttribute('id', 'lettre' + Math.random());
            nouvelleCase.appendChild(nouvelleLettre);
            caseModifiable.appendChild(nouvelleCase);

            nouvelleLettre.setAttribute('draggable', 'true');
            nouvelleLettre.addEventListener('dragstart', gererDragStart);
        });

        // Action pour le bouton "Valider"
        validerButton.addEventListener('click', () => {
            alert("Le jeu a été validé !");
        });

        // Action pour le bouton "Entrer" (met à jour le nom de joueur)
        entrerButton.addEventListener('click', () => {
            const nomJoueur = nomJoueurInput.value.trim();
            if (nomJoueur) {
                nomJoueurElement.textContent = nomJoueur;
                nomJoueurInput.value = ''; // Réinitialise le champ de saisie après l'entrée du nom
            } else {
                alert('Veuillez entrer un nom valide.');
            }
        });

        // Action pour le bouton "Se connecter"
        connecterButton.addEventListener('click', () => {
            const nomJoueur = nomJoueurInput.value.trim();
            if (nomJoueur) {
                nomJoueurElement.textContent = nomJoueur;
                nomJoueurInput.value = ''; // Réinitialise le champ de saisie après la connexion
            } else {
                alert('Veuillez entrer un nom de joueur');
            }
        });

        // Initialiser la grille et les lettres au démarrage
        genererGrille();
        genererLettresCentre();
        genererLettresInitiales();

        // Fonction de zoom
        zoomInButton.addEventListener('click', () => {
            carte.style.transform = 'scale(1.2)';
        });

        zoomOutButton.addEventListener('click', () => {
            carte.style.transform = 'scale(0.8)';
        });
    </script>
</body>

</html>
