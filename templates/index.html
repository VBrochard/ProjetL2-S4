<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Graphique de Jeu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #93c5fd, #2563eb);
            color: white;
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        button {
            background-color: #ef4444; /* Rouge */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #dc2626; /* Rouge foncé */
            transform: scale(1.05);
        }

        button:active {
            transform: scale(1);
        }
    </style>
</head>
<body>
    <h1>Client Graphique de Jeu</h1>
    <div class="button-container">
        <button id="btn-long-word">Le Plus Long Mot</button>
        <button id="btn-opti-mot">Opti'Mot</button>
        <button id="btn-quit">Quitter</button>
    </div>

    <script>
        document.getElementById('btn-long-word').addEventListener('click', function() {
            window.location.href = 'le_plus_long.html'; // Redirige vers une nouvelle page
        });

        document.getElementById('btn-opti-mot').addEventListener('click', function() {
            alert("Opti'Mot");
        });

        document.getElementById('btn-quit').addEventListener('click', function() {
            if (confirm('Voulez-vous vraiment quitter?')) {
                window.close();
            }
        });
    </script>
</body>
</html>
